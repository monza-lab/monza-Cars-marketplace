name: AutoScout24 Bulk Enrichment (Daily)

on:
  schedule:
    - cron: '30 7 * * *'     # 07:30 UTC daily (after AS24 collector at 05:00)
  workflow_dispatch:
    inputs:
      max_listings:
        description: 'Max listings to enrich'
        default: '500'
      delay_ms:
        description: 'Delay between requests (ms)'
        default: '1000'
      dry_run:
        description: 'Skip DB writes'
        default: 'false'

concurrency:
  group: autoscout24-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scrapling
        run: pip install "scrapling[fetchers]"

      - name: Run bulk enrichment (scrapling)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPLING_PYTHON: python
        run: |
          npx tsx scripts/as24-enrich-scrapling.ts \
            --limit=${{ github.event.inputs.max_listings || '500' }} \
            --delayMs=${{ github.event.inputs.delay_ms || '2000' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dryRun' || '' }}

      - name: Verify scraper quality gate
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npx tsx scripts/verify-scraper-quality.mjs \
            --scraper=as24-enrich \
            ${{ github.event.inputs.dry_run == 'true' && '--dryRun' || '' }}
