name: Classic.com Collector (Daily)

on:
  schedule:
    - cron: '0 4 * * *'     # 04:00 UTC daily
  workflow_dispatch:          # Manual trigger with overrides
    inputs:
      max_pages:
        description: 'Max search pages'
        default: '170'
      max_listings:
        description: 'Max listings to process'
        default: '5000'
      dry_run:
        description: 'Skip DB writes'
        default: 'false'

concurrency:
  group: classic-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify environment
        run: |
          node --version
          npm --version
          ls -la package-lock.json

      - name: Install Scrapling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "scrapling[fetchers,shell]"
          scrapling install

      - run: npm ci

      - name: Install Playwright browsers
        run: |
          npx playwright install-deps chromium
          npx playwright install chromium
          npx rebrowser-playwright install chromium || true

      - name: Run collector (incremental)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DECODO_PROXY_URL: ${{ secrets.DECODO_PROXY_URL }}
          DECODO_PROXY_USER: ${{ secrets.DECODO_PROXY_USER }}
          DECODO_PROXY_PASS: ${{ secrets.DECODO_PROXY_PASS }}
          SCRAPLING_FETCH_MODE: stealthy-fetch
        run: |
          npx tsx src/features/scrapers/classic_collector/cli.ts \
            --maxPages=${{ github.event.inputs.max_pages || '170' }} \
            --maxListings=${{ github.event.inputs.max_listings || '5000' }} \
            --navigationDelayMs=3000 \
            --pageTimeoutMs=30000 \
            --summaryOnly \
            ${{ github.event.inputs.dry_run == 'true' && '--dryRun' || '' }}

      - name: Upload output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classic-collector-output
          path: var/classic_collector/
          retention-days: 7
          if-no-files-found: ignore
