name: Classic.com Image Backfill

on:
  schedule:
    - cron: '30 4 * * *'     # 04:30 UTC daily (after classic collector at 04:00)
  workflow_dispatch:          # Manual trigger with overrides
    inputs:
      max_listings:
        description: 'Max listings to backfill'
        default: '200'
      navigation_delay:
        description: 'Delay between pages (ms)'
        default: '4000'
      time_budget:
        description: 'Time budget (ms)'
        default: '2400000'

concurrency:
  group: classic-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Install Playwright browsers
        run: |
          npx playwright install-deps chromium
          npx rebrowser-playwright install chromium

      - name: Run image backfill
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DECODO_PROXY_URL: ${{ secrets.DECODO_PROXY_URL }}
          DECODO_PROXY_USER: ${{ secrets.DECODO_PROXY_USER }}
          DECODO_PROXY_PASS: ${{ secrets.DECODO_PROXY_PASS }}
        run: |
          npx tsx scripts/backfill-classic-images.ts \
            --maxListings=${{ github.event.inputs.max_listings || '200' }} \
            --navigationDelayMs=${{ github.event.inputs.navigation_delay || '4000' }} \
            --timeBudgetMs=${{ github.event.inputs.time_budget || '2400000' }}
