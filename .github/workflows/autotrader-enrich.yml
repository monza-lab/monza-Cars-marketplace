name: AutoTrader Enrichment

on:
  schedule:
    - cron: '30 3 * * *'     # 03:30 UTC (after collector at 02:00)
    - cron: '30 9 * * *'     # 09:30 UTC
    - cron: '30 15 * * *'    # 15:30 UTC
    - cron: '30 21 * * *'    # 21:30 UTC
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max listings to enrich'
        default: '500'
      delay_ms:
        description: 'Delay between requests (ms)'
        default: '2000'
      dry_run:
        description: 'Skip DB writes'
        default: 'false'

concurrency:
  group: autotrader-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Run AutoTrader enrichment
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npx tsx scripts/autotrader-enrich.ts \
            --limit=${{ github.event.inputs.limit || '500' }} \
            --delayMs=${{ github.event.inputs.delay_ms || '2000' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dryRun' || '' }}
