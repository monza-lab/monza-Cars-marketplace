name: BeForward Enrichment (Daily)

on:
  schedule:
    # 06:30 and 18:30 UTC — after the BeForward collector (03:00) and image
    # backfill (04:30). Two runs/day drain more backlog, each on a fresh
    # GitHub runner IP (resets any AWS WAF per-IP throttle between runs).
    - cron: '30 6,18 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max active listings to enrich (one persistent StealthySession reuses the AWS WAF token across all)'
        default: '100'

concurrency:
  group: beforward-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Scrapling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "scrapling[fetchers,shell]"
          scrapling install

      - run: npm ci

      - name: Install Playwright browsers (for Scrapling dynamic mode)
        run: |
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: Run BeForward enrichment
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Optional residential proxy — the reliable fix for AWS WAF throttling
          # GitHub's datacenter IPs. Read by beforward_scrapling_fetch.py. Without
          # it, a fraction of fetches per run are WAF-blocked (bounded retry helps).
          BF_PROXY_URL: ${{ secrets.BF_PROXY_URL }}
        run: |
          # Resolve the actual python path from setup-python
          SCRAPLING_PYTHON="$(which python3)"
          export SCRAPLING_PYTHON
          echo "Using Scrapling Python: $SCRAPLING_PYTHON"

          npx tsx scripts/bf-enrich-cli.ts \
            --limit=${{ github.event.inputs.limit || '400' }}
