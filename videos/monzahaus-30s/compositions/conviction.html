<template id="conviction-template">
  <div data-composition-id="conviction" data-width="1080" data-height="1920" data-start="0" data-duration="3.3">
    <img class="detail-photo" id="s4-p1" src="../assets/photos/detail_8fcbb332_0.jpeg" />
    <img class="detail-photo" id="s4-p2" src="../assets/photos/detail_b5230632_1.jpg" />
    <img class="detail-photo" id="s4-p3" src="../assets/photos/detail_bff987eb_2.jpeg" />
    <img class="detail-photo" id="s4-p4" src="../assets/photos/detail_49bb5b5a_4.jpg" />
    <div class="warm-tint"></div>
    <div class="vignette"></div>
    <div class="grain"></div>
    <div class="word-overlay">
      <div class="word" id="s4-word">By conviction.</div>
    </div>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500;600;700&family=Karla:wght@300;400;500;600;700&display=swap');

      [data-composition-id="conviction"] {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: #0E0A0C;
        overflow: hidden;
      }
      [data-composition-id="conviction"] .detail-photo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 45%;
        opacity: 0;
        will-change: opacity, transform;
      }
      [data-composition-id="conviction"] .vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse at center, transparent 42%, rgba(14,10,12,0.38) 82%, rgba(14,10,12,0.82) 100%),
          linear-gradient(to top, rgba(14,10,12,0.60) 0%, transparent 30%, transparent 70%, rgba(14,10,12,0.40) 100%);
      }
      [data-composition-id="conviction"] .warm-tint {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(ellipse at 50% 30%, rgba(212,115,138,0.10), transparent 70%);
        mix-blend-mode: screen;
      }
      [data-composition-id="conviction"] .grain {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.16;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.91  0 0 0 0 0.89  0 0 0 0 0.87  0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        mix-blend-mode: overlay;
      }
      [data-composition-id="conviction"] .word-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      [data-composition-id="conviction"] .word {
        font-family: 'Cormorant', serif;
        font-weight: 400;
        font-style: italic;
        font-size: 122px;
        letter-spacing: 0.02em;
        color: #FDFBF9;
        opacity: 0;
        text-shadow: 0 8px 60px rgba(0,0,0,0.88);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const sel = (s) => '[data-composition-id="conviction"] ' + s;

        // 4 details at 0.75s each = 3.0s + 0.3s hold.
        const beat = 0.75;
        const photos = ['#s4-p1','#s4-p2','#s4-p3','#s4-p4'];
        for (let i = 0; i < photos.length; i++) {
          const tIn = i * beat;
          if (i > 0) {
            tl.to(sel(photos[i - 1]), { opacity: 0, duration: 0.28, ease: 'power1.inOut' }, tIn);
          }
          tl.fromTo(sel(photos[i]),
            { opacity: 0, scale: 1.04 },
            { opacity: 1, scale: 1.0, duration: 0.45, ease: 'power2.inOut' },
          tIn);
          tl.to(sel(photos[i]), { scale: 1.03, duration: 0.65, ease: 'none' }, tIn + 0.1);
        }

        tl.fromTo(sel('#s4-word'),
          { opacity: 0, y: 20, letterSpacing: '0.12em' },
          { opacity: 1, y: 0, letterSpacing: '0.02em', duration: 0.8, ease: 'expo.out' },
        0.3);

        window.__timelines = window.__timelines || {};
        window.__timelines['conviction'] = tl;
      })();
    </script>
  </div>
</template>
