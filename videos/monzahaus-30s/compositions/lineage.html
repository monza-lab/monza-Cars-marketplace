    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500;600;700&family=Karla:wght@300;400;500;600;700&display=swap');

      [data-composition-id="lineage"] {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: #0E0A0C;
        overflow: hidden;
      }
      [data-composition-id="lineage"] .lineage-photo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 45%;
        opacity: 0;
        will-change: opacity, transform;
      }
      /* Lighter gradient — car must be prominently visible. */
      [data-composition-id="lineage"] .vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse at center, transparent 48%, rgba(14,10,12,0.35) 82%, rgba(14,10,12,0.80) 100%),
          linear-gradient(to top, rgba(14,10,12,0.78) 0%, rgba(14,10,12,0.20) 30%, transparent 48%, transparent 82%, rgba(14,10,12,0.40) 100%);
      }
      [data-composition-id="lineage"] .warm-tint {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(ellipse at 50% 30%, rgba(212,115,138,0.08), transparent 70%);
        mix-blend-mode: screen;
      }
      [data-composition-id="lineage"] .grain {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.14;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.91  0 0 0 0 0.89  0 0 0 0 0.87  0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        mix-blend-mode: overlay;
      }
      [data-composition-id="lineage"] .top-tag {
        position: absolute;
        left: 80px;
        top: 120px;
        font-family: 'Karla', sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.36em;
        font-size: 18px;
        color: rgba(232,226,222,0.75);
        opacity: 0;
      }
      [data-composition-id="lineage"] .series-badge {
        position: absolute;
        left: 80px;
        bottom: 180px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        opacity: 0;
        will-change: opacity, transform;
      }
      [data-composition-id="lineage"] .series-code {
        font-family: 'Cormorant', serif;
        font-weight: 400;
        font-style: italic;
        font-size: 220px;
        line-height: 0.85;
        color: #E8E2DE;
        letter-spacing: -0.02em;
        text-shadow: 0 8px 40px rgba(0,0,0,0.85);
      }
      [data-composition-id="lineage"] .series-meta {
        font-family: 'Karla', sans-serif;

        text-transform: uppercase;

      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const sel = (s) => '[data-composition-id="lineage"] ' + s;

        // 8 families at 0.80s per beat = 6.4s + intro tag.
        const beat = 0.80;
        const photos = ['#s2-p1','#s2-p2','#s2-p3','#s2-p4','#s2-p5','#s2-p6','#s2-p7','#s2-p8'];
        const badges = ['#s2-b1','#s2-b2','#s2-b3','#s2-b4','#s2-b5','#s2-b6','#s2-b7','#s2-b8'];

        tl.from(sel('#s2-tag'), { y: 10, opacity: 0, duration: 0.4, ease: 'expo.out' }, 0.05);

        for (let i = 0; i < photos.length; i++) {
          const tIn = i * beat;
          if (i > 0) {
            tl.to(sel(photos[i - 1]), { opacity: 0, duration: 0.28, ease: 'power1.inOut' }, tIn);
            tl.to(sel(badges[i - 1]), { opacity: 0, duration: 0.24, ease: 'power1.inOut' }, tIn);
          }
          tl.fromTo(sel(photos[i]),
            { opacity: 0, scale: 1.06 },
            { opacity: 1, scale: 1.0, duration: 0.45, ease: 'power2.inOut' },
          tIn);
          tl.fromTo(sel(badges[i]),
            { opacity: 0, y: 18 },
            { opacity: 1, y: 0, duration: 0.45, ease: 'expo.out' },
          tIn + 0.08);
        }

        window.__timelines = window.__timelines || {};
        window.__timelines['lineage'] = tl;
      })();
    </script>
  </div>
</template>
